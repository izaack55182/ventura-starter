<symbol viewBox="0 0 80 80" fill="none" id="codenity-dark">
  
  <g>
      
  <defs>
    
    <linearGradient id="landing-gen-frostBody" x1="0%" y1="0%" x2="100%" y2="100%">
        
        <stop offset="0%" stop-color="white" stop-opacity="0.35" ></stop>
        
        <stop offset="50%" stop-color="white" stop-opacity="0.15" ></stop>
        
        <stop offset="100%" stop-color="white" stop-opacity="0.3" ></stop>
    </linearGradient>

    
<filter id="landing-gen-frostFilter" x="-100%" y="-100%" width="300%" height="300%" filterUnits="objectBoundingBox">        
        
        <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="shadowBlur"></feGaussianBlur>
        <feOffset in="shadowBlur" dx="0" dy="6" result="shadowOffset"></feOffset>
        <feFlood flood-color="black" flood-opacity="0.2" result="shadowColor"></feFlood>
        <feComposite in="shadowColor" in2="shadowOffset" operator="in" result="dropShadow"></feComposite>

        
        
        <feMorphology operator="erode" radius="1" in="SourceAlpha" result="eroded"></feMorphology>
        <feComposite in="SourceAlpha" in2="eroded" operator="out" result="strokeMask"></feComposite>
        
        
        <feFlood flood-color="white" flood-opacity="0.8" result="strokeColor"></feFlood>
        <feComposite in="strokeColor" in2="strokeMask" operator="in" result="rimLight"></feComposite>

        
        <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blurMap"></feGaussianBlur>
        <feSpecularLighting in="blurMap" surfaceScale="2" specularConstant="0.6" specularExponent="10" lighting-color="white" result="specular">
            <fePointLight x="-100" y="-100" z="300" ></fePointLight>
        </feSpecularLighting>
        <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularSheen"></feComposite>

        
        <feMerge>
            <feMergeNode in="dropShadow"></feMergeNode>    
            <feMergeNode in="SourceGraphic"></feMergeNode> 
            <feMergeNode in="specularSheen"></feMergeNode> 
            <feMergeNode in="rimLight"></feMergeNode>      
        </feMerge>
    </filter>

    <mask id="landing-gen-m2"><rect x="-1000" y="-1000" width="4000" height="4000" fill="white"></rect><path d="M 50 40 L 40 50" stroke="black" stroke-width="8" stroke-linecap="round"></path></mask>
    <mask id="landing-gen-m3"><rect x="-1000" y="-1000" width="4000" height="4000" fill="white"></rect><path d="M 60 20 L 30 50" stroke="black" stroke-width="10" stroke-linecap="round"></path></mask>
    <clipPath id="landing-gen-cp"><rect x="0" y="0" width="80" height="80" ></rect></clipPath>
  </defs>

  <g clip-path="url(#landing-gen-cp)">
      
      <path d="M 50 50 L 15 85" stroke="url(#landing-gen-frostBody)" stroke-width="6" stroke-linecap="round" mask="url(#landing-gen-m2)" filter="url(#landing-gen-frostFilter)" ></path>
      
      
      <path d="M 50 40 L 40 50" stroke="url(#landing-gen-frostBody)" stroke-width="4" stroke-linecap="round" mask="url(#landing-gen-m3)" filter="url(#landing-gen-frostFilter)" ></path>
      
      
      <path d="M 60 20 L 30 50" stroke="url(#landing-gen-frostBody)" stroke-width="6" stroke-linecap="round" filter="url(#landing-gen-frostFilter)" ></path>
  </g>
  
