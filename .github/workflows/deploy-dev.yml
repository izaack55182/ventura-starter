name: 🧪 Deploy to Cloudflare Workers (dev / staging)

on:
  push:
    branches: [dev]

jobs:
  deploy-dev:
    name: ✅ CI & 🌐 Deploy (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Typecheck
        run: bun run typecheck

      - name: 🧪 Unit tests
        run: bun run test

      # El entorno se fija en BUILD time (plugin de Vite de Cloudflare). El build
      # genera la config aplanada del entorno `dev` que luego despliega wrangler.
      - name: 🏗️ Build (env dev)
        run: bun run build
        env:
          CLOUDFLARE_ENV: dev

      - name: 🌐 Deploy to Cloudflare Workers (dev)
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_ENV: dev
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
