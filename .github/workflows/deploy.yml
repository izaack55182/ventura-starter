name: 🚀 Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: ✅ CI & 🌐 Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Typecheck
        run: bun run typecheck

      - name: 🧪 Unit tests
        run: bun run test

      - name: 🏗️ Build
        run: bun run build

      # El deploy corre en el MISMO job que el build para que wrangler encuentre
      # la config redirigida (.wrangler/deploy/config.json + build/server/wrangler.json)
      # que genera @cloudflare/vite-plugin.
      - name: 🌐 Deploy to Cloudflare Workers
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
